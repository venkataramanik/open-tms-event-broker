version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: tms_broker
    ports:
      - "5672:5672"
      - "15672:15672"

  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: tms_ledger_db
    environment:
      POSTGRES_DB: tms_ledger
      POSTGRES_PASSWORD: pure_opensource_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api_gateway:
    build: ./api
    container_name: tms_api
    ports:
      - "7860:7860"
    depends_on:
      - rabbitmq
      - postgres

  event_worker:
    build: ./workers
    container_name: tms_worker
    depends_on:
      - rabbitmq
      - postgres

volumes:
  pgdata:
